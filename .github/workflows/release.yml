name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "b02e341c927f16d991edbd915d8ea43eac52096c"

      - name: Setup QtMsBuild
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.qt.io/official_releases/vsaddin/3.5.0/qt-vsaddin-msvc2022-x64-3.5.0.vsix" -OutFile "qtvsaddin.zip"
          Expand-Archive -Path "qtvsaddin.zip" -DestinationPath "qtvsaddin" -Force
          Copy-Item -Path "qtvsaddin\QtMSBuild" -Destination "QtMsBuild" -Recurse

      - name: Build
        run: |
          msbuild Sudoku_demo.vcxproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:VcpkgEnabled=true `
            /p:VcpkgEnableManifest=true `
            /p:QtInstallDir="$env:QT_ROOT_DIR" `
            /p:QtToolsPath="$env:QT_ROOT_DIR\bin" `
            /m

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_pkg
          Copy-Item x64\Release\Sudoku_demo.exe release_pkg\
          # 复制 vcpkg 依赖的 DLL (如 OpenCV)
          if (Test-Path "x64\Release\*.dll") {
            Copy-Item x64\Release\*.dll release_pkg\
          }
          # 复制需要的资源文件夹
          Copy-Item -Path Character_Sample, OCR_Model, Sudoku_Sample -Destination release_pkg\ -Recurse
          # 使用 windeployqt 收集 Qt 依赖
          windeployqt --release --dir release_pkg release_pkg\Sudoku_demo.exe

      - name: Build Installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Sudoku_demo_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}